<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rush Cooking A Chef Madness Game</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#3a0066,#6a0dad);
    color:#fff;
}
.container{max-width:1100px;margin:auto;padding:20px}
.hero{text-align:center;padding:40px 20px}

/* New CSS for Title and Icon */
.header-title {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 15px;
    flex-wrap: wrap; /* Helps on very small screens */
    margin-bottom: 10px;
}
.game-icon {
    width: 80px;
    height: 80px;
    border-radius: 18px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}
.hero h1{
    font-size: 2.2rem;
    margin: 0;
}

.hero-img{width:100%;max-width:420px;border-radius:20px;margin:25px auto;display:block}
.buttons{display:flex;flex-direction:column;gap:15px;margin-top:20px}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px;border-radius:12px;font-weight:600;text-decoration:none;color:white}
.amazon{background:#ff9900}
.play{background:#34a853}
.btn img{width:24px}
.section{margin-top:60px}
.features{display:grid;gap:15px}
.feature{background:rgba(255,255,255,0.08);padding:18px;border-radius:14px}
/* --- Universal Buttons Style --- */
.download-buttons {
    display: flex;
    flex-direction: column;
    gap: 15px;
    margin-top: 20px;
    width: 100%;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
}

.download-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 12px 24px;
    border-radius: 10px;
    text-decoration: none;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    text-align: left; /* Keeps text aligned properly */
}

.download-btn:active {
    transform: scale(0.96); 
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
}

.download-btn img {
    width: 35px; /* Slightly larger icon to match the badge style */
    height: auto; 
    object-fit: contain;
}

/* Badge Text Styling */
.btn-text {
    display: flex;
    flex-direction: column;
    line-height: 1.1;
}

.small-text {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.large-text {
    font-size: 20px;
    font-weight: 600;
}

/* --- Specific Button Colors --- */
/* Amazon: White background, Black text */
.download-btn.amazon {
    background: #ffffff; 
    color: #000000; 
    border: 1px solid #cccccc;
}

/* Play Store: Black background, White text */
.download-btn.play {
    background: #000000; 
    color: #ffffff; 
    border: 1px solid #333333;
}

/* Auto slider updated for more images */
.slider{overflow:hidden;position:relative}
.slide-track{
    display:flex;
    /* Increased time to 30s so it doesn't move too fast with more images */
    animation:scroll 30s linear infinite; 
}
.slide-track img{width:220px;margin-right:15px;border-radius:12px}
@keyframes scroll{
    0%{transform:translateX(0)}
    100%{transform:translateX(-50%)}
}

.video-container {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%; /* 16:9 ratio */
    height: 0;
    overflow: hidden;
    border-radius: 15px;
}

.video-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}

@media(min-width:768px){
    .hero h1{font-size:3rem}
    .game-icon {width: 100px; height: 100px;}
    .buttons{flex-direction:row;justify-content:center}
    .features{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="container">

<div class="hero">
    
    <div class="header-title">
        <img src="GameIcon.png" alt="Game Icon" class="game-icon" onerror="this.src='https://placehold.co/100x100/27272a/ffffff?text=Icon'">
        <h1>Rush Cooking A Chef Madness Game</h1>
    </div>
    
    <p><strong>Cook Fast • Serve Smart • Build Your Dream Restaurant</strong></p>

    <img class="hero-img" src="FeatureImage.png" alt="Game Feature Image" onerror="this.src='https://placehold.co/420x236/27272a/ffffff?text=Feature+Image'">

<div class="download-buttons">
    <a class="download-btn amazon" href="https://www.amazon.com/gp/mas/dl/android?p=com.cookingutopia.foodgame.adventure">
        <img src="amazonIcon.png" alt="Amazon Logo">
        <div class="btn-text">
            <span class="small-text">GET IT ON</span>
            <span class="large-text">Amazon Store</span>
        </div>
    </a>

    <a class="download-btn play" href="https://play.google.com/store/apps/details?id=com.CookingUtopia.Canteen.Kitchen.MadnessChef.Craze.Fever">
        <img src="playstoreIcon.png" alt="Google Play Logo">
        <div class="btn-text">
            <span class="small-text">GET IT ON</span>
            <span class="large-text">Google Play</span>
        </div>
    </a>
</div>

<div class="section">
    <h2>🔥 Features</h2>
    <div class="features">
        <div class="feature">🍔 Cook global dishes</div>
        <div class="feature">⏱️ Fast gameplay</div>
        <div class="feature">🏨 Build restaurants</div>
        <div class="feature">🎯 Hundreds of levels</div>
    </div>
</div>

<div class="section">
    <h2>📸 Gameplay</h2>
    <div class="slider">
        <div class="slide-track">
            <img src="ScreenShot1.png" alt="Screenshot 1">
            <img src="ScreenShot2.png" alt="Screenshot 2">
            <img src="ScreenShot3.png" alt="Screenshot 3">
            <img src="ScreenShot4.png" alt="Screenshot 4">
            <img src="ScreenShot5.png" alt="Screenshot 5">
            <img src="ScreenShot6.png" alt="Screenshot 6">
            <img src="ScreenShot7.png" alt="Screenshot 7">
            
            <img src="ScreenShot1.png" alt="Screenshot 1">
            <img src="ScreenShot2.png" alt="Screenshot 2">
            <img src="ScreenShot3.png" alt="Screenshot 3">
            <img src="ScreenShot4.png" alt="Screenshot 4">
            <img src="ScreenShot5.png" alt="Screenshot 5">
            <img src="ScreenShot6.png" alt="Screenshot 6">
            <img src="ScreenShot7.png" alt="Screenshot 7">
        </div>
    </div>
</div>

<div class="section">
    <h2>🎥 Watch Gameplay</h2>
    
    <div class="video-container">
        <iframe 
            src="https://www.youtube.com/embed/5FQsRUoC9tQ"
            frameborder="0"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
            allowfullscreen>
        </iframe>
    </div>
</div>

<div class="section" style="text-align:center">
    <h2>🚀 Download Now</h2>
    <div class="buttons">
        <a class="btn amazon" href="https://www.amazon.com/gp/mas/dl/android?p=com.cookingutopia.foodgame.adventure">Amazon</a>
        <a class="btn play" href="https://play.google.com/store/apps/details?id=com.CookingUtopia.Canteen.Kitchen.MadnessChef.Craze.Fever">Play Store</a>
    </div>
</div>

</div>
</body>
</html>
