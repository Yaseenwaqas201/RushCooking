<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cooking Utopia</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:linear-gradient(135deg,#3a0066,#6a0dad);
    color:#fff;
}
.container{max-width:1100px;margin:auto;padding:20px}
.hero{text-align:center;padding:40px 20px}
.hero h1{font-size:2.5rem}
.hero-img{width:100%;max-width:420px;border-radius:20px;margin:25px auto;display:block}
.buttons{display:flex;flex-direction:column;gap:15px;margin-top:20px}
.btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:16px;border-radius:12px;font-weight:600;text-decoration:none;color:white}
.amazon{background:#ff9900}
.play{background:#34a853}
.btn img{width:24px}
.section{margin-top:60px}
.features{display:grid;gap:15px}
.feature{background:rgba(255,255,255,0.08);padding:18px;border-radius:14px}

/* Auto slider */
.slider{overflow:hidden;position:relative}
.slide-track{display:flex;animation:scroll 15s linear infinite}
.slide-track img{width:220px;margin-right:15px;border-radius:12px}
@keyframes scroll{
    0%{transform:translateX(0)}
    100%{transform:translateX(-50%)}
}

.video-container {
    position: relative;
    width: 100%;
    padding-bottom: 56.25%; /* 16:9 ratio */
    height: 0;
    overflow: hidden;
    border-radius: 15px;
}

.video-container iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}
@media(min-width:768px){
.hero h1{font-size:3rem}
.buttons{flex-direction:row;justify-content:center}
.features{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="container">

<div class="hero">
<h1>🍳 Cooking Utopia</h1>
<p><strong>Cook Fast • Serve Smart • Build Your Dream Restaurant</strong></p>

<img class="hero-img" src="FeatureImage.png" alt="Game">

<div class="buttons">
<a class="btn amazon" href="https://www.amazon.com/gp/mas/dl/android?p=com.cookingutopia.foodgame.adventure">
<img src="amazonIcon.png"> Amazon Store
</a>

<a class="btn play" href="https://play.google.com/store/apps/details?id=com.CookingUtopia.Canteen.Kitchen.MadnessChef.Craze.Fever">
<img src="playstoreIcon.png"> Play Store
</a>
</div>
</div>

<div class="section">
<h2>🔥 Features</h2>
<div class="features">
<div class="feature">🍔 Cook global dishes</div>
<div class="feature">⏱️ Fast gameplay</div>
<div class="feature">🏨 Build restaurants</div>
<div class="feature">🎯 Hundreds of levels</div>
</div>
</div>

<div class="section">
<h2>📸 Gameplay</h2>
<div class="slider">
<div class="slide-track">
<img src="ScreenShot1.png">
<img src="ScreenShot2.png">
<img src="ScreenShot3.png">
<img src="ScreenShot1.png">
<img src="ScreenShot2.png">
<img src="ScreenShot3.png">
</div>
</div>
</div>

<div class="section">
    <h2>🎥 Watch Gameplay</h2>
    
    <div class="video-container">
        <iframe 
            src="https://www.youtube.com/embed/YOUR_VIDEO_ID"
            frameborder="0"
            allowfullscreen>
        </iframe>
    </div>
</div>

<div class="section" style="text-align:center">
<h2>🚀 Download Now</h2>
<div class="buttons">
<a class="btn amazon" href="https://www.amazon.com/gp/mas/dl/android?p=com.cookingutopia.foodgame.adventure">Amazon</a>
<a class="btn play" href="#">Play Store</a>
</div>
</div>

</div>
</body>
</html>
